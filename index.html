<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VetFlow SaaS Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#f1f5f9; }
    .card { background:white; border:1px solid #e2e8f0; border-radius:24px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
    .input { width:100%; border:1px solid #e2e8f0; border-radius:16px; padding:10px 14px; outline:none; background:white; }
    .input:focus { border-color:#94a3b8; box-shadow:0 0 0 3px rgba(148,163,184,.15); }
    .small-input { width:100%; border:1px solid #e2e8f0; border-radius:12px; padding:8px 10px; outline:none; background:white; }
    .small-input:focus { border-color:#94a3b8; box-shadow:0 0 0 3px rgba(148,163,184,.15); }
    .tab-active { background:white; color:#020617; }
    .pill { border-radius:999px; padding:4px 10px; font-size:12px; font-weight:600; }
    @media print {
      body.printing * { visibility:hidden; }
      body.printing #print-sheet, body.printing #print-sheet * { visibility:visible; }
      body.printing #print-sheet { position:absolute; left:0; top:0; width:100%; background:white; padding:24px; }
    }
  </style>
</head>
<body class="text-slate-900">
  <div class="min-h-screen grid grid-cols-1 xl:grid-cols-[280px_1fr]">
    <aside class="bg-slate-950 text-white p-6 xl:p-7">
      <div class="flex items-center gap-3">
        <div class="p-3 rounded-2xl bg-white/10 text-xl">🐾</div>
        <div>
          <p class="text-sm text-slate-400">Demo base</p>
          <h1 class="text-xl font-semibold">VetFlow SaaS</h1>
        </div>
      </div>

      <div class="mt-8 p-4 rounded-3xl bg-white/5 border border-white/10">
        <p class="text-sm text-slate-300">Enfoque del producto</p>
        <p class="text-sm text-slate-400 mt-2 leading-relaxed">Sistema para clínica veterinaria con inventario, servicios, expedientes, remisiones, cobranza y recetas.</p>
      </div>

      <nav id="navTabs" class="mt-8 space-y-2"></nav>

      <div class="mt-8 p-4 rounded-3xl bg-emerald-500/10 border border-emerald-500/20">
        <p class="text-sm font-medium text-emerald-300">Médicos</p>
        <div id="doctorList" class="mt-2 space-y-2 text-sm text-slate-300"></div>
      </div>
    </aside>

    <main class="p-4 md:p-6 xl:p-8">
      <div id="app"></div>
    </main>
  </div>

  <div id="print-sheet" style="display:none;"></div>

<script>
(function() {
  const DOCTORS = ['Stephanie Gonzalez', 'Melissa Pérez', 'Emiliano Mireles'];
  const PAYMENT_METHODS = ['Efectivo', 'Transferencia', 'Tarjeta débito', 'Tarjeta crédito'];

  const SERVICES = [
    ['CONSULTA DIA','Consulta',400],['CONSULTA NOCHE','Consulta',600],['APLI MED 0-5 KG','Aplicación',120],
    ['APLI MED 5-10 KG','Aplicación',140],['APLI MED 10-15 KG','Aplicación',160],['APLI MED 15-20 KG','Aplicación',180],
    ['APLI MED 20 KG +','Aplicación',220],['LIMPIEZA HERIDA','Procedimiento',100],['LIMPIEZA PROFUNDA','Procedimiento',200],
    ['LIMPIEZA OIDOS','Procedimiento',200],['V PUPPY','Vacuna',350],['V QUINTUPLE','Vacuna',300],['V SEXTUPLE','Vacuna',350],
    ['V BORDETELLA','Vacuna',200],['V GIARDIA','Vacuna',350],['V RABIA','Vacuna',150],['V TRIPLE FELINA','Vacuna',280],
    ['V LEUCEMIA','Vacuna',450],['DESP 0-5 KG','Desparasitación',100],['DESP 5-10 KG','Desparasitación',120],
    ['DEPS 10-15 KG','Desparasitación',140],['DESP 15-20 KG','Desparasitación',160],['DESP 20 KG +','Desparasitación',200],
    ['4DX','Laboratorio',675],['SIDA/LEUCEMIA','Laboratorio',680],['PARVO/CORONA/GIARDIA','Laboratorio',700],
    ['DISTEMPER','Laboratorio',650],['BIOMETRIA HEMATICA','Laboratorio',400],['QUIMICA SANGUINEA','Laboratorio',750],
    ['COPROLOGICO','Laboratorio',400],['COPROCULTIVO','Laboratorio',500],['ECO','Estudio',150]
  ];

  const state = {
    tab: 'dashboard',
    selectedPatientId: 1,
    selectedInvoicePatientId: 1,
    selectedPrescriptionPatientId: 1,
    paymentMethod: PAYMENT_METHODS[0],
    searchPatient: '',
    inventoryForm: { name:'', category:'', stock:'', unit:'', cost:'', price:'' },
    serviceForm: { name:'', category:'', basePrice:'', duration:'', notes:'' },
    patientForm: { petName:'', species:'', breed:'', age:'', birthDate:'', sex:'', ownerName:'', ownerAddress:'', email:'', phone:'', notes:'' },
    quickPatientForm: { petName:'', species:'', breed:'', age:'', birthDate:'', sex:'', ownerName:'', ownerAddress:'', email:'', phone:'', notes:'' },
    historyForm: { date:new Date().toISOString().slice(0,10), type:'Consulta', title:'', notes:'' },
    prescriptionForm: { doctor: DOCTORS[0], body:'' },
    invoiceCart: [],
    inventory: [
      { id: 1, name: 'Tramadol', category: 'Medicamento', stock: 20, unit: 'caja', cost: 90, price: 150 },
      { id: 2, name: 'Predni Pets', category: 'Medicamento', stock: 18, unit: 'caja', cost: 85, price: 145 },
      { id: 3, name: 'Gastroprazol', category: 'Medicamento', stock: 15, unit: 'caja', cost: 80, price: 140 },
      { id: 4, name: 'Meloxicam', category: 'Medicamento', stock: 22, unit: 'caja', cost: 88, price: 148 },
      { id: 5, name: 'Nidazol', category: 'Medicamento', stock: 12, unit: 'caja', cost: 92, price: 155 },
      { id: 6, name: 'Cefalexina', category: 'Antibiótico', stock: 14, unit: 'caja', cost: 95, price: 160 },
      { id: 7, name: 'Enrofloxacina', category: 'Antibiótico', stock: 16, unit: 'caja', cost: 98, price: 168 },
      { id: 8, name: 'Metoclopramida', category: 'Medicamento', stock: 18, unit: 'caja', cost: 70, price: 125 },
      { id: 9, name: 'Nutriplus', category: 'Suplemento', stock: 11, unit: 'pieza', cost: 120, price: 190 },
      { id: 10, name: 'Humectan', category: 'Cuidado', stock: 10, unit: 'pieza', cost: 110, price: 180 },
      { id: 11, name: 'Dicflotan', category: 'Medicamento', stock: 13, unit: 'caja', cost: 86, price: 146 },
      { id: 12, name: 'Tobracetil', category: 'Oftálmico', stock: 9, unit: 'pieza', cost: 130, price: 220 },
      { id: 13, name: 'L-Histamin', category: 'Medicamento', stock: 17, unit: 'caja', cost: 76, price: 132 }
    ],
    services: SERVICES.map((s, i) => ({ id: i+1, name:s[0], category:s[1], basePrice:s[2], duration:'15 min', notes:'' })),
    patients: [
      { id:1, petName:'Luna', species:'Canino', breed:'Mestiza', age:'4 años', birthDate:'2022-03-20', sex:'Hembra', ownerName:'Daniela Ruiz', ownerAddress:'Av. Sierra Leona 245, San Luis Potosí', email:'daniela@email.com', phone:'8112345678', notes:'Paciente nerviosa en consulta.', documents:[{ id:11, name:'Cartilla_vacunacion_Luna.pdf', type:'application/pdf', size:'1.2 MB', uploadedAt:'2026-04-05' }], history:[{ id:101, date:'2026-04-01', type:'Consulta', title:'Consulta general', notes:'Se revisa estado general.' }]},
      { id:2, petName:'Milo', species:'Felino', breed:'Siamés', age:'2 años', birthDate:'2024-01-10', sex:'Macho', ownerName:'Carlos Méndez', ownerAddress:'Priv. Lomas 18, San Luis Potosí', email:'carlos@email.com', phone:'8187654321', notes:'Alergia alimentaria en seguimiento.', documents:[], history:[]}
    ],
    invoices: [
      { id:1001, date:'2026-04-12', patientId:1, patientName:'Luna', ownerName:'Daniela Ruiz', items:[{ type:'service', name:'CONSULTA DIA', qty:1, unitPrice:400, total:400 }, { type:'inventory', name:'Tramadol', qty:1, unitPrice:150, total:150 }], paymentMethod:'Efectivo', subtotal:550, amountPaid:0, balance:550, status:'Pendiente' }
    ],
    prescriptions: [
      { id:1, ownerName:'Daniela Ruiz', patientId:1, patientName:'Luna', birthDate:'2022-03-20', age:'4 años', breed:'Mestiza', sex:'Hembra', ownerAddress:'Av. Sierra Leona 245, San Luis Potosí', ownerPhone:'8112345678', doctor:'Stephanie Gonzalez', body:'Tramadol 1 ml cada 12 horas por 5 días.\nReposo relativo.\nVigilar apetito y temperatura.', createdAt:'2026-04-20' }
    ]
  };

  const tabs = [
    { key:'dashboard', label:'Panel' },
    { key:'inventory', label:'Inventario' },
    { key:'services', label:'Servicios' },
    { key:'patients', label:'Expedientes' },
    { key:'invoices', label:'Remisiones' },
    { key:'billing', label:'Cobranza' },
    { key:'prescriptions', label:'Recetas' }
  ];

  const money = (n) => new Intl.NumberFormat('es-MX', { style:'currency', currency:'MXN' }).format(Number(n || 0));
  const esc = (v) => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const app = document.getElementById('app');

  function selectedPatient() {
    return state.patients.find(p => p.id === Number(state.selectedPatientId)) || state.patients[0] || null;
  }
  function invoicePatient() {
    return state.patients.find(p => p.id === Number(state.selectedInvoicePatientId)) || state.patients[0] || null;
  }
  function prescriptionPatient() {
    return state.patients.find(p => p.id === Number(state.selectedPrescriptionPatientId)) || state.patients[0] || null;
  }

  function renderNav() {
    document.getElementById('navTabs').innerHTML = tabs.map(t => `
      <button data-tab="${t.key}" class="nav-btn w-full text-left px-4 py-3 rounded-2xl ${state.tab === t.key ? 'tab-active' : 'text-slate-300 hover:bg-white/5'}">${esc(t.label)}</button>
    `).join('');
    document.getElementById('doctorList').innerHTML = DOCTORS.map(d => `<div>${esc(d)}</div>`).join('');
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.onclick = () => {
        state.tab = btn.dataset.tab;
        render();
      };
    });
  }

  function sectionTitle(title, subtitle, actionHtml='') {
    return `
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-5">
        <div>
          <h2 class="text-xl md:text-2xl font-semibold text-slate-900">${esc(title)}</h2>
          <p class="text-sm text-slate-500">${esc(subtitle)}</p>
        </div>
        ${actionHtml}
      </div>
    `;
  }

  function renderDashboard() {
    const pending = state.invoices.filter(i => i.status !== 'Pagado').reduce((a,b) => a + b.balance, 0);
    const billed = state.invoices.reduce((a,b) => a + b.subtotal, 0);
    const paid = state.invoices.reduce((a,b) => a + b.amountPaid, 0);
    const margin = state.inventory.reduce((a,b) => a + ((b.price - b.cost) * b.stock), 0);

    app.innerHTML = `
      ${sectionTitle('Panel general', 'Vista operativa, clínica y financiera de la veterinaria.')}
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
        ${statCard('Pacientes registrados', state.patients.length, 'Expedientes activos')}
        ${statCard('Servicios disponibles', state.services.length, 'Catálogo editable')}
        ${statCard('Cobranza pendiente', money(pending), 'Saldo por recuperar')}
        ${statCard('Recetas emitidas', state.prescriptions.length, 'Historial imprimible')}
      </div>
      <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 mt-4">
        <div class="card p-5 xl:col-span-2">
          <h3 class="text-lg font-semibold mb-4">Resumen de valor</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm text-slate-600">
            ${featureCard('Expediente conectado con remisiones', 'Todo servicio realizado queda ligado a la mascota.')}
            ${featureCard('Inventario editable', 'Los insumos pueden ajustarse directamente en tabla.')}
            ${featureCard('Recetas listas para imprimir', 'Los médicos pueden imprimir o descargar el formato.')}
            ${featureCard('Pago identificado', 'Cada remisión registra método de pago.')}
          </div>
        </div>
        <div class="card p-5">
          <h3 class="text-lg font-semibold mb-4">Resumen financiero</h3>
          <div class="space-y-4 text-sm">
            <div class="flex justify-between"><span class="text-slate-500">Total facturado</span><span class="font-semibold">${money(billed)}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Total cobrado</span><span class="font-semibold">${money(paid)}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Saldo pendiente</span><span class="font-semibold text-amber-600">${money(pending)}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Utilidad potencial inventario</span><span class="font-semibold text-emerald-600">${money(margin)}</span></div>
          </div>
        </div>
      </div>
    `;
  }

  function statCard(title, value, hint) {
    return `
      <div class="card p-5">
        <p class="text-sm text-slate-500">${esc(title)}</p>
        <p class="text-2xl font-semibold mt-1">${esc(value)}</p>
        <p class="text-xs text-slate-400 mt-2">${esc(hint)}</p>
      </div>
    `;
  }

  function featureCard(title, text) {
    return `
      <div class="p-4 rounded-2xl bg-slate-50">
        <p class="font-medium text-slate-900 mb-1">${esc(title)}</p>
        <p>${esc(text)}</p>
      </div>
    `;
  }

  function renderInventory() {
    const totalValue = state.inventory.reduce((a,b) => a + (Number(b.cost||0) * Number(b.stock||0)), 0);
    app.innerHTML = `
      ${sectionTitle('Inventario', 'Todos los campos son editables y mantienen cálculo de utilidad.')}
      <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
        <div class="card p-5 xl:col-span-2 overflow-auto">
          <div class="mb-4 flex items-center justify-between">
            <h3 class="text-lg font-semibold">Listado editable</h3>
            <span class="text-sm text-slate-500">Valor en costo: ${money(totalValue)}</span>
          </div>
          <table class="w-full text-sm min-w-[920px]">
            <thead>
              <tr class="text-left text-slate-500 border-b border-slate-200">
                <th class="pb-3">Producto</th>
                <th class="pb-3">Categoría</th>
                <th class="pb-3">Stock</th>
                <th class="pb-3">Unidad</th>
                <th class="pb-3">Costo</th>
                <th class="pb-3">Venta</th>
                <th class="pb-3">Utilidad</th>
                <th class="pb-3"></th>
              </tr>
            </thead>
            <tbody>
              ${state.inventory.map(item => `
                <tr class="border-b border-slate-100">
                  <td class="py-3 pr-2"><input class="small-input inv-field" data-id="${item.id}" data-field="name" value="${esc(item.name)}"></td>
                  <td class="py-3 pr-2"><input class="small-input inv-field" data-id="${item.id}" data-field="category" value="${esc(item.category)}"></td>
                  <td class="py-3 pr-2"><input type="number" class="small-input inv-field" data-id="${item.id}" data-field="stock" value="${item.stock}"></td>
                  <td class="py-3 pr-2"><input class="small-input inv-field" data-id="${item.id}" data-field="unit" value="${esc(item.unit)}"></td>
                  <td class="py-3 pr-2"><input type="number" class="small-input inv-field" data-id="${item.id}" data-field="cost" value="${item.cost}"></td>
                  <td class="py-3 pr-2"><input type="number" class="small-input inv-field" data-id="${item.id}" data-field="price" value="${item.price}"></td>
                  <td class="py-3 font-medium text-emerald-600">${money(Number(item.price||0) - Number(item.cost||0))}</td>
                  <td class="py-3 text-right"><button class="remove-inventory p-2 rounded-xl hover:bg-slate-100" data-id="${item.id}">🗑️</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <div class="card p-5">
          <h3 class="text-lg font-semibold mb-4">Agregar insumo</h3>
          <div class="space-y-3">
            <input id="inventory-name" class="input" placeholder="Nombre" value="${esc(state.inventoryForm.name)}">
            <input id="inventory-category" class="input" placeholder="Categoría" value="${esc(state.inventoryForm.category)}">
            <div class="grid grid-cols-2 gap-3">
              <input id="inventory-stock" class="input" type="number" placeholder="Stock" value="${esc(state.inventoryForm.stock)}">
              <input id="inventory-unit" class="input" placeholder="Unidad" value="${esc(state.inventoryForm.unit)}">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <input id="inventory-cost" class="input" type="number" placeholder="Costo" value="${esc(state.inventoryForm.cost)}">
              <input id="inventory-price" class="input" type="number" placeholder="Precio venta" value="${esc(state.inventoryForm.price)}">
            </div>
            <button id="btn-add-inventory" class="w-full rounded-2xl bg-slate-900 text-white py-3 font-medium">Guardar insumo</button>
          </div>
        </div>
      </div>
    `;

    document.querySelectorAll('.inv-field').forEach(el => {
      el.oninput = () => {
        const id = Number(el.dataset.id);
        const field = el.dataset.field;
        state.inventory = state.inventory.map(item => item.id === id ? {
          ...item,
          [field]: ['stock','cost','price'].includes(field) ? Number(el.value || 0) : el.value
        } : item);
        render();
      };
    });

    document.querySelectorAll('.remove-inventory').forEach(btn => {
      btn.onclick = () => {
        const id = Number(btn.dataset.id);
        state.inventory = state.inventory.filter(i => i.id !== id);
        render();
      };
    });

    ['name','category','stock','unit','cost','price'].forEach(field => {
      const el = document.getElementById('inventory-' + field);
      el.oninput = () => { state.inventoryForm[field] = el.value; };
    });

    document.getElementById('btn-add-inventory').onclick = () => {
      const f = state.inventoryForm;
      if (!f.name || !f.category) return;
      state.inventory.unshift({
        id: Date.now(),
        name: f.name,
        category: f.category,
        stock: Number(f.stock || 0),
        unit: f.unit || 'pieza',
        cost: Number(f.cost || 0),
        price: Number(f.price || 0)
      });
      state.inventoryForm = { name:'', category:'', stock:'', unit:'', cost:'', price:'' };
      render();
    };
  }

  function renderServices() {
    app.innerHTML = `
      ${sectionTitle('Catálogo de servicios', 'Precios cargados y edición directa sobre tabla.')}
      <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
        <div class="card p-5 xl:col-span-2 overflow-auto">
          <h3 class="text-lg font-semibold mb-4">Servicios editables</h3>
          <table class="w-full text-sm min-w-[900px]">
            <thead>
              <tr class="text-left text-slate-500 border-b border-slate-200">
                <th class="pb-3">Nombre</th>
                <th class="pb-3">Categoría</th>
                <th class="pb-3">Precio</th>
                <th class="pb-3">Duración</th>
                <th class="pb-3">Notas</th>
                <th class="pb-3"></th>
              </tr>
            </thead>
            <tbody>
              ${state.services.map(s => `
                <tr class="border-b border-slate-100">
                  <td class="py-3 pr-2"><input class="small-input service-field" data-id="${s.id}" data-field="name" value="${esc(s.name)}"></td>
                  <td class="py-3 pr-2"><input class="small-input service-field" data-id="${s.id}" data-field="category" value="${esc(s.category)}"></td>
                  <td class="py-3 pr-2"><input type="number" class="small-input service-field" data-id="${s.id}" data-field="basePrice" value="${s.basePrice}"></td>
                  <td class="py-3 pr-2"><input class="small-input service-field" data-id="${s.id}" data-field="duration" value="${esc(s.duration)}"></td>
                  <td class="py-3 pr-2"><input class="small-input service-field" data-id="${s.id}" data-field="notes" value="${esc(s.notes)}"></td>
                  <td class="py-3 text-right"><button class="remove-service p-2 rounded-xl hover:bg-slate-100" data-id="${s.id}">🗑️</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="card p-5">
          <h3 class="text-lg font-semibold mb-4">Nuevo servicio</h3>
          <div class="space-y-3">
            <input id="service-name" class="input" placeholder="Nombre del servicio" value="${esc(state.serviceForm.name)}">
            <input id="service-category" class="input" placeholder="Categoría" value="${esc(state.serviceForm.category)}">
            <div class="grid grid-cols-2 gap-3">
              <input id="service-basePrice" class="input" type="number" placeholder="Precio base" value="${esc(state.serviceForm.basePrice)}">
              <input id="service-duration" class="input" placeholder="Duración" value="${esc(state.serviceForm.duration)}">
            </div>
            <textarea id="service-notes" class="input min-h-[110px]" placeholder="Notas">${esc(state.serviceForm.notes)}</textarea>
            <button id="btn-add-service" class="w-full rounded-2xl bg-slate-900 text-white py-3 font-medium">Guardar servicio</button>
          </div>
        </div>
      </div>
    `;

    document.querySelectorAll('.service-field').forEach(el => {
      el.oninput = () => {
        const id = Number(el.dataset.id);
        const field = el.dataset.field;
        state.services = state.services.map(s => s.id === id ? {
          ...s,
          [field]: field === 'basePrice' ? Number(el.value || 0) : el.value
        } : s);
        render();
      };
    });

    document.querySelectorAll('.remove-service').forEach(btn => {
      btn.onclick = () => {
        const id = Number(btn.dataset.id);
        state.services = state.services.filter(s => s.id !== id);
        render();
      };
    });

    ['name','category','basePrice','duration','notes'].forEach(field => {
      const el = document.getElementById('service-' + field);
      el.oninput = () => { state.serviceForm[field] = el.value; };
    });

    document.getElementById('btn-add-service').onclick = () => {
      const f = state.serviceForm;
      if (!f.name) return;
      state.services.unshift({
        id: Date.now(),
        name: f.name,
        category: f.category || 'General',
        basePrice: Number(f.basePrice || 0),
        duration: f.duration || '15 min',
        notes: f.notes || ''
      });
      state.serviceForm = { name:'', category:'', basePrice:'', duration:'', notes:'' };
      render();
    };
  }

  function patientFormHtml(prefix, form) {
    return `
      <input id="${prefix}-petName" class="input" placeholder="Nombre de mascota" value="${esc(form.petName)}">
      <div class="grid grid-cols-2 gap-3">
        <input id="${prefix}-species" class="input" placeholder="Especie" value="${esc(form.species)}">
        <input id="${prefix}-breed" class="input" placeholder="Raza" value="${esc(form.breed)}">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <input id="${prefix}-age" class="input" placeholder="Edad" value="${esc(form.age)}">

      render();

      };
    });

    document.querySelectorAll('.add-inventory').forEach(btn => {

        if (!item) return;
        state.invoiceCart.push({ uid: Date.now() + Math.random(), type:'inventory', refId:item.id, name:item.name, qty:1, unitPrice:item.price, total:item.price });
        render();
      };
    });

    document.querySelectorAll('.remove-cart').forEach(btn => {
      btn.onclick = () => {
        const index = Number(btn.dataset.index);
        state.invoiceCart.splice(index, 1);
        render();

    });

    document.querySelectorAll('.cart-qty').forEach(input => {
      input.oninput = () => {
        const index = Number(input.dataset.index);
        const qty = Number(input.value || 1);
        const line = state.invoiceCart[index];
        if (!line) return;
        line.qty = qty;
        line.total = qty * line.unitPrice;
        render();
      };
    });

    document.getElementById('btn-create-invoice').onclick = () => {
      const patient = invoicePatient();
      if (!patient || state.invoiceCart.length === 0) return;

      const subtotal = state.invoiceCart.reduce((a,b) => a + b.total, 0);
      const inventoryLines = state.invoiceCart.filter(c => c.type === 'inventory');

      state.inventory = state.inventory.map(item => {
        const used = inventoryLines.filter(line => line.refId === item.id).reduce((a,b) => a + Number(b.qty || 0), 0);
        return used ? { ...item, stock: Math.max(0, item.stock - used) } : item;
      });

      const newInvoice = {
        id: Math.floor(1000 + Math.random() * 9000),
        date: new Date().toISOString().slice(0,10),
        patientId: patient.id,
        patientName: patient.petName,
        ownerName: patient.ownerName,
        items: state.invoiceCart.map(x => ({ ...x })),
        paymentMethod: state.paymentMethod,
        subtotal,
        status: 'Pendiente',
        amountPaid: 0,
        balance: subtotal
      };

      state.invoices.unshift(newInvoice);

      const serviceNames = state.invoiceCart.map(item => `${item.name} x${item.qty}`).join(', ');
      patient.history.unshift({
        id: Date.now(),
        date: newInvoice.date,
        type: 'Servicio',
        title: `Remisión #${newInvoice.id}`,
        notes: `Método de pago: ${state.paymentMethod}. Servicios e insumos: ${serviceNames}. Total: ${money(newInvoice.subtotal)}.`
      });

      state.invoiceCart = [];
      render();
    };
  }

              <div class="flex justify-between"><span class="text-slate-500">Total</span><span class="font-medium">${money(inv.subtotal)}</span></div>
              <div class="flex justify-between"><span class="text-slate-500">Cobrado</span><span class="font-medium">${money(inv.amountPaid)}</span></div>
              <div class="flex justify-between"><span class="text-slate-500">Pendiente</span><span class="font-medium text-amber-600">${money(inv.balance)}</span></div>
            </div>
            <div class="mt-4 flex gap-2">
              <input type="number" class="input payment-field" data-id="${inv.id}" placeholder="Monto">
              <button class="apply-payment rounded-2xl bg-slate-900 text-white px-4 py-3 font-medium" data-id="${inv.id}">Aplicar</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    document.querySelectorAll('.apply-payment').forEach(btn => {
      btn.onclick = () => {
        const id = Number(btn.dataset.id);
        const input = document.querySelector('.payment-field[data-id="' + id + '"]');
        const amount = Number(input.value || 0);
        if (!amount) return;
        state.invoices = state.invoices.map(inv => {
          if (inv.id !== id) return inv;
          const amountPaid = Math.min(inv.subtotal, inv.amountPaid + amount);
          const balance = Math.max(0, inv.subtotal - amountPaid);
          return { ...inv, amountPaid, balance, status: balance === 0 ? 'Pagado' : 'Pendiente' };
        });
        render();
      };
    });
  }

  function renderPrescriptions() {
    const patient = prescriptionPatient();
    app.innerHTML = `
      ${sectionTitle('Recetas', 'Formato listo para descargar o imprimir por los veterinarios.')}
      <div class="grid grid-cols-1 xl:grid-cols-12 gap-4">
        <div class="card p-5 xl:col-span-5">
          <h3 class="text-lg font-semibold mb-4">Nueva receta</h3>
          <div class="space-y-3">
            <select id="prescription-patient" class="input">
              ${state.patients.map(p => `<option value="${p.id}" ${Number(state.selectedPrescriptionPatientId) === p.id ? 'selected' : ''}>${esc(p.petName)} · ${esc(p.ownerName)}</option>`).join('')}
            </select>
            <select id="prescription-doctor" class="input">
              ${DOCTORS.map(d => `<option ${state.prescriptionForm.doctor === d ? 'selected' : ''}>${esc(d)}</option>`).join('')}
            </select>

            ${patient ? `
              <div class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-700 space-y-1">
                <p><span class="font-medium">Propietario:</span> ${esc(patient.ownerName)}</p>
                <p><span class="font-medium">Paciente:</span> ${esc(patient.petName)}</p>
                <p><span class="font-medium">Fecha nacimiento:</span> ${esc(patient.birthDate || 'No capturada')}</p>
                <p><span class="font-medium">Edad:</span> ${esc(patient.age || 'No capturada')}</p>
                <p><span class="font-medium">Raza:</span> ${esc(patient.breed || 'No capturada')}</p>
                <p><span class="font-medium">Sexo:</span> ${esc(patient.sex || 'No capturado')}</p>
                <p><span class="font-medium">Dirección:</span> ${esc(patient.ownerAddress || 'No capturada')}</p>
                <p><span class="font-medium">Celular:</span> ${esc(patient.phone || 'No capturado')}</p>
              </div>
            ` : ''}

            <textarea id="prescription-body" class="input min-h-[220px]" placeholder="Indicaciones médicas, dosis, duración, observaciones...">${esc(state.prescriptionForm.body)}</textarea>
            <button id="btn-save-prescription" class="w-full rounded-2xl bg-slate-900 text-white py-3 font-medium">Guardar receta</button>
          </div>
        </div>

        <div class="card p-5 xl:col-span-7">
          <h3 class="text-lg font-semibold mb-4">Historial de recetas</h3>
          <div class="space-y-3 max-h-[760px] overflow-auto pr-1">
            ${state.prescriptions.map(rx => `
              <div class="rounded-2xl border border-slate-200 p-4">
                <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                  <div>
                    <p class="font-semibold">${esc(rx.patientName)}</p>
                    <p class="text-sm text-slate-500">${esc(rx.ownerName)} · ${esc(rx.doctor)}</p>
                    <p class="text-xs text-slate-400 mt-1">${esc(rx.createdAt)}</p>
                  </div>
                  <div class="flex gap-2">
                    <button class="print-rx rounded-2xl border border-slate-200 px-3 py-2 text-sm font-medium" data-id="${rx.id}">Imprimir</button>
                    <button class="download-rx rounded-2xl border border-slate-200 px-3 py-2 text-sm font-medium" data-id="${rx.id}">Descargar</button>
                  </div>
                </div>
                <div class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-3 text-sm text-slate-600">
                  <div class="rounded-2xl bg-slate-50 p-3">
                    <p><span class="font-medium">Propietario:</span> ${esc(rx.ownerName)}</p>
                    <p><span class="font-medium">Paciente:</span> ${esc(rx.patientName)}</p>
                    <p><span class="font-medium">Fecha nacimiento:</span> ${esc(rx.birthDate || '—')}</p>
                    <p><span class="font-medium">Edad:</span> ${esc(rx.age || '—')}</p>
                    <p><span class="font-medium">Raza:</span> ${esc(rx.breed || '—')}</p>
                    <p><span class="font-medium">Sexo:</span> ${esc(rx.sex || '—')}</p>
                  </div>
                  <div class="rounded-2xl bg-slate-50 p-3">
                    <p><span class="font-medium">Dirección:</span> ${esc(rx.ownerAddress || '—')}</p>
                    <p><span class="font-medium">Celular:</span> ${esc(rx.ownerPhone || '—')}</p>
                  </div>
                </div>
                <div class="mt-3 rounded-2xl bg-slate-50 p-3 whitespace-pre-wrap text-sm text-slate-700">${esc(rx.body || 'Sin indicaciones.')}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;

    document.getElementById('prescription-patient').onchange = (e) => {
      state.selectedPrescriptionPatientId = Number(e.target.value);
      render();
    };
    document.getElementById('prescription-doctor').onchange = (e) => {
      state.prescriptionForm.doctor = e.target.value;
    };
    document.getElementById('prescription-body').oninput = (e) => {
      state.prescriptionForm.body = e.target.value;
    };

    document.getElementById('btn-save-prescription').onclick = () => {
      const p = prescriptionPatient();
      if (!p) return;
      state.prescriptions.unshift({
        id: Date.now(),
        ownerName: p.ownerName,
        patientId: p.id,
        patientName: p.petName,
        birthDate: p.birthDate || '',
        age: p.age || '',
        breed: p.breed || '',
        sex: p.sex || '',
        ownerAddress: p.ownerAddress || '',
        ownerPhone: p.phone || '',
        doctor: state.prescriptionForm.doctor,
        body: state.prescriptionForm.body,
        createdAt: new Date().toISOString().slice(0,10)
      });
      state.prescriptionForm.body = '';
      render();
    };

    document.querySelectorAll('.print-rx').forEach(btn => {
      btn.onclick = () => {
        const id = Number(btn.dataset.id);
        const rx = state.prescriptions.find(r => r.id === id);
        if (!rx) return;
        const sheet = document.getElementById('print-sheet');
        sheet.innerHTML = `
          <h1 style="font-size:24px;font-weight:700;margin-bottom:16px;">Receta Veterinaria</h1>
          <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
            <tr><th style="border:1px solid #ccc;padding:10px;text-align:left;">Propietario</th><td style="border:1px solid #ccc;padding:10px;">${esc(rx.ownerName)}</td><th style="border:1px solid #ccc;padding:10px;text-align:left;">Médico</th><td style="border:1px solid #ccc;padding:10px;">${esc(rx.doctor)}</td></tr>
            <tr><th style="border:1px solid #ccc;padding:10px;text-align:left;">Paciente</th><td style="border:1px solid #ccc;padding:10px;">${esc(rx.patientName)}</td><th style="border:1px solid #ccc;padding:10px;text-align:left;">Fecha</th><td style="border:1px solid #ccc;padding:10px;">${esc(rx.createdAt)}</td></tr>
            <tr><th style="border:1px solid #ccc;padding:10px;text-align:left;">Fecha nacimiento</th><td style="border:1px solid #ccc;padding:10px;">${esc(rx.birthDate)}</td><th style="border:1px solid #ccc;padding:10px;text-align:left;">Edad</th><td style="border:1px solid #ccc;padding:10px;">${esc(rx.age)}</td></tr>
            <tr><th style="border:1px solid #ccc;padding:10px;text-align:left;">Raza</th><td style="border:1px solid #ccc;padding:10px;">${esc(rx.breed)}</td><th style="border:1px solid #ccc;padding:10px;text-align:left;">Sexo</th><td style="border:1px solid #ccc;padding:10px;">${esc(rx.sex)}</td></tr>
            <tr><th style="border:1px solid #ccc;padding:10px;text-align:left;">Dirección</th><td colspan="3" style="border:1px solid #ccc;padding:10px;">${esc(rx.ownerAddress)}</td></tr>
            <tr><th style="border:1px solid #ccc;padding:10px;text-align:left;">Celular</th><td colspan="3" style="border:1px solid #ccc;padding:10px;">${esc(rx.ownerPhone)}</td></tr>
          </table>
          <div style="border:1px solid #ccc;padding:14px;min-height:180px;white-space:pre-wrap;">${esc(rx.body)}</div>
        `;
        sheet.style.display = 'block';
        document.body.classList.add('printing');
        window.print();
        document.body.classList.remove('printing');
        sheet.style.display = 'none';
      };
    });

    document.querySelectorAll('.download-rx').forEach(btn => {
      btn.onclick = () => {
        const id = Number(btn.dataset.id);
        const rx = state.prescriptions.find(r => r.id === id);
        if (!rx) return;
        const text = `Propietario: ${rx.ownerName}\nPaciente: ${rx.patientName}\nFecha nacimiento: ${rx.birthDate}\nEdad: ${rx.age}\nRaza: ${rx.breed}\nSexo: ${rx.sex}\nDirección: ${rx.ownerAddress}\nCelular: ${rx.ownerPhone}\nMédico: ${rx.doctor}\nFecha: ${rx.createdAt}\n\nIndicaciones:\n${rx.body}`;
        const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `receta_${rx.patientName}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      };
    });
  }

  function iconByType(type) {
    if ((type || '').includes('pdf')) return 'PDF';
    if ((type || '').includes('image')) return 'IMG';
    if ((type || '').includes('word')) return 'DOC';
    if ((type || '').includes('sheet')) return 'XLS';
    return 'FILE';
  }

  function render() {
    renderNav();
    if (state.tab === 'dashboard') return renderDashboard();
    if (state.tab === 'inventory') return renderInventory();
    if (state.tab === 'services') return renderServices();
    if (state.tab === 'patients') return renderPatients();
    if (state.tab === 'invoices') return renderInvoices();
    if (state.tab === 'billing') return renderBilling();
    if (state.tab === 'prescriptions') return renderPrescriptions();
  }

  render();
})();
</script>
</body>
</html>
